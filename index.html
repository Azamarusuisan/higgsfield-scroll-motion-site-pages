<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Higgsfield MCPで生成した3本の映像を1本につなぎ、スクロールで進める日本語モーションサイト。"
    />
    <title>スクロールで進む1本の動画 | Higgsfield MCP Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="motion-canvas" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand-mark" href="#top" aria-label="トップへ戻る">HF</a>
      <nav class="site-nav" aria-label="主要ナビゲーション">
        <a href="#tokyo">Tokyo</a>
        <a href="#motion">Motion</a>
        <a href="#proof">Result</a>
      </nav>
    </header>

    <main id="top">
      <section id="tokyo" class="film-stage" data-film="tokyo" aria-label="東京散歩スクロール動画">
        <div class="sticky-film">
          <video class="film-video" muted playsinline preload="auto">
            <source src="./assets/videos/tokyo-scroll-film.mp4" type="video/mp4" />
          </video>
          <div class="film-shade" aria-hidden="true"></div>

          <div class="film-copy">
            <p class="chapter-kicker">TOKYO WALK</p>
            <h1 class="chapter-title">東京を歩く。</h1>
          </div>

          <div class="film-ui" aria-hidden="true">
            <div class="timeline"><span></span></div>
            <ol class="chapter-dots">
              <li class="is-active">Alley</li>
              <li>Crossing</li>
              <li>Station</li>
            </ol>
          </div>

          <p class="scroll-hint">scroll</p>
        </div>
      </section>

      <section id="motion" class="film-stage" data-film="motion" aria-label="現行モーションスクロール動画">
        <div class="sticky-film">
          <video class="film-video" muted playsinline preload="auto">
            <source src="./assets/videos/connected-scroll-film.mp4" type="video/mp4" />
          </video>
          <div class="film-shade" aria-hidden="true"></div>

          <div class="film-copy">
            <p class="chapter-kicker">ORIGINAL MOTION</p>
            <h1 class="chapter-title">現行版も残す。</h1>
          </div>

          <div class="film-ui" aria-hidden="true">
            <div class="timeline"><span></span></div>
            <ol class="chapter-dots">
              <li class="is-active">Hero</li>
              <li>Problem</li>
              <li>After</li>
            </ol>
          </div>

          <p class="scroll-hint">scroll</p>
        </div>
      </section>

      <section id="proof" class="proof-section" aria-labelledby="proof-title">
        <p class="eyebrow">RESULT</p>
        <h2 id="proof-title">2本作った。</h2>
        <div class="proof-grid">
          <p>Tokyo Walk</p>
          <p>Original Motion</p>
          <p>Render Static Site</p>
        </div>
        <a class="live-link" href="https://higgsfield-scroll-motion-site.onrender.com/">
          Renderで見る
        </a>
      </section>
    </main>

    <script src="./main.js" type="module"></script>
  </body>
</html>
